apiVersion: apps/v1
kind: Deployment
metadata:
  name: curechain-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: curechain-backend
  template:
    metadata:
      labels:
        app: curechain-backend
    spec:
      containers:
        - name: backend
          image: curechain-backend:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
          # Add database URL, JWT secret, etc. as needed
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: curechain-backend-service
spec:
  selector:
    app: curechain-backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
